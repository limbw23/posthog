<body>

<h2>Step 3/3 : Confirmation Page</h2>

<form onsubmit="submitForm(event)">
<div>
  <p>User Name: <span id="user_name"></span></p>
  <p>Email: <span id="user_email"></span></p>
  <p>Name: <span id="name"></span></p>
  <p>Address: <span id="addr"></span></p>
  <p>Product: <span id="product"></span></p>
  <p>Quantity: <span id="qty"></span></p>
</div>

<button type="submit">Submit</button>


<script>

document.getElementById("user_name").innerText = localStorage.getItem("user_name");
document.getElementById("user_email").innerText = localStorage.getItem("user_email");
document.getElementById("name").innerText = localStorage.getItem("name");
document.getElementById("addr").innerText = localStorage.getItem("addr");
document.getElementById("product").innerText = localStorage.getItem("product");
document.getElementById("qty").innerText = localStorage.getItem("qty");




const email = localStorage.getItem("user_email");
const name = localStorage.getItem("user_name");

if(email){
  posthog.identify(email, {
    email: email,
    name: name
  });
}

function submitForm(event){

  event.preventDefault();

  posthog.capture("form_submitted");

  alert("Form submitted!");
}

</script>
